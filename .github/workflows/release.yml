name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [sf, hf]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache Docker layers — Dockerfile.* builds ffmpeg/openssl/libplist from
      # source, which takes ~10 min without cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.target }}
          key: ${{ runner.os }}-buildx-${{ matrix.target }}-${{ hashFiles(format('Dockerfile.{0}', matrix.target)) }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.target }}-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.target }}
          load: true
          tags: airplay-kindle-builder-${{ matrix.target }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.target }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.target }}-new,mode=max

      # Prevents cache from growing unbounded
      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.target }}
          mv /tmp/.buildx-cache-${{ matrix.target }}-new /tmp/.buildx-cache-${{ matrix.target }}

      - name: Build libairplay_mirror.so (ARM, ${{ matrix.target }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -e TARGET=${{ matrix.target }} \
            airplay-kindle-builder-${{ matrix.target }}:latest

      - name: Assemble plugin
        run: make _assemble SO=build-kindle-${{ matrix.target }}/libairplay_mirror.so TARGET=${{ matrix.target }}

      - name: Package
        run: |
          cd dist-${{ matrix.target }}
          zip -r "../airplay.koplugin-${{ matrix.target }}-${{ github.ref_name }}.zip" airplay.koplugin/
          cd ..
          sha256sum "airplay.koplugin-${{ matrix.target }}-${{ github.ref_name }}.zip" \
            > "airplay.koplugin-${{ matrix.target }}-${{ github.ref_name }}.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: airplay-koplugin-${{ matrix.target }}
          path: |
            airplay.koplugin-${{ matrix.target }}-${{ github.ref_name }}.zip
            airplay.koplugin-${{ matrix.target }}-${{ github.ref_name }}.zip.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/airplay.koplugin-sf-${{ github.ref_name }}.zip
            artifacts/airplay.koplugin-sf-${{ github.ref_name }}.zip.sha256
            artifacts/airplay.koplugin-hf-${{ github.ref_name }}.zip
            artifacts/airplay.koplugin-hf-${{ github.ref_name }}.zip.sha256
          body: |
            ## Install

            1. Download the zip matching your Kindle's firmware:
               - `airplay.koplugin-sf-${{ github.ref_name }}.zip` — firmware <=5.16.2.1.1 (Paperwhite 1-5, Voyage, Oasis 1-3)
               - `airplay.koplugin-hf-${{ github.ref_name }}.zip` — firmware >=5.16.3 (Paperwhite 6/12, current Scribe, or any device updated past 5.16.2.1.1)
            2. Unzip and copy `airplay.koplugin/` to your Kindle:
               ```
               cp -r airplay.koplugin /Volumes/Kindle/extensions/koreader/plugins/
               ```
            3. Restart KOReader

            **Not sure which one you need?** Check Settings → Device Info on the Kindle, or `cat /etc/prettyversion.txt` over SSH — anything 5.16.3 or newer is the hard-float (hf) build.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
